  - type: Features
    data:
      - name: Mission Modernization & Sustainment
        description: >-
          Lifecycle engineering, operations, training, logistics, and
          sustainment support for U.S. and allied military, intelligence, and
          mission customers across air, land, sea, space, and cyber domains.
      - name: Space Systems
        description: >-
          Mission systems and ground operations for civil and national security
          space, including prime contracting on NASA's Exploration Ground
          Systems Program at Kennedy Space Center supporting the Artemis
          program.
      - name: Digital Transformation
        description: >-
          IT modernization, cloud migration, software engineering, data
          platforms, and managed services for defense, intelligence, and
          civilian agencies.
      - name: Sustainability & Environment
        description: >-
          Environmental remediation, climate resilience, hazardous waste, and
          munitions response work for federal and state environmental missions.
      - name: Advanced Energy Solutions
        description: >-
          Nuclear, clean energy, and energy infrastructure engineering,
          including Owner's Engineer roles for new Small Modular Reactor
          programs and support to national laboratories.
      - name: Data Analytics & Cyber
        description: >-
          Mission cyber, intelligence analytics, AI/ML, and offensive and
          defensive cyber capabilities inherited from Jacobs' Cyber &
          Intelligence portfolio.
  - type: Customers
    data:
      - name: U.S. Department of Defense
        description: >-
          Army, Air Force, Navy & Marine Corps, and Special Operations Command
          across CONUS and forward-deployed locations.
      - name: U.S. Intelligence Community
        description: >-
          Mission systems, analytics, linguistics, and cyber programs for the
          intelligence enterprise.
      - name: NASA
        description: >-
          Prime contractor for NASA's Exploration Ground Systems Program at
          Kennedy Space Center, supporting the Artemis program including
          Artemis II launch and recovery.
      - name: U.S. Department of Energy
        description: >-
          Engineering, operations, and environmental work at national
          laboratories including Lawrence Livermore National Laboratory and
          Idaho National Laboratory.
      - name: U.S. Department of Homeland Security
        description: >-
          USCIS biometrics services at 130 USCIS locations across the United
          States and its territories.
      - name: U.S. Allies
        description: >-
          United Kingdom MoD (including Owner's Engineer role for the UK's
          first Small Modular Reactors), Australian Defence Force, and other
          partner-nation programs.
      - name: U.S. Civilian Agencies
        description: >-
          State, civilian, and emergency response customers including a
          $425 million CAL FIRE aerial firefighting operations support
          contract.
  - type: Compliance
    data:
      - name: U.S. Government Security Clearance
        description: >-
          Personnel hold U.S. government security clearances up to TS/SCI with
          polygraph as required by program. Personnel security policies cover
          drug abstinence windows prior to clearance application.
      - name: Federal Contracting
        description: >-
          Operates under Federal Acquisition Regulation (FAR) and Defense FAR
          Supplement (DFARS) including cybersecurity, supply chain, and
          accounting compliance for U.S. federal contracts.
  - type: Subsidiaries
    data:
