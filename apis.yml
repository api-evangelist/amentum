aid: amentum
name: Amentum
description: >-
  Amentum Holdings, Inc. (NYSE: AMTM) is a global advanced engineering and
  technology solutions company serving U.S. federal customers across defense,
  intelligence, energy, space, and civilian missions, with allied work in the
  United Kingdom and Australia. The company was created from the spin-off of
  AECOM's Management Services business in 2020, and on September 27, 2024
  completed a Reverse Morris Trust transaction with Jacobs Solutions to merge
  Jacobs' Critical Mission Solutions (CMS) and Cyber & Intelligence (C&I)
  businesses into Amentum. Post-merger Amentum reports approximately $14.4
  billion in fiscal year 2025 revenue, a $47.1 billion backlog, ~53,000
  employees in 80 countries, and is headquartered in Chantilly, Virginia. The
  business is organized around six capability areas — Mission Modernization &
  Sustainment, Space Systems, Digital Transformation, Sustainability &
  Environment, Advanced Energy Solutions, and Data Analytics & Cyber. Most
  delivery occurs under contract through classified, CAC-gated, or program
  portals; no public developer portal, OpenAPI, or REST API has been
  identified.
